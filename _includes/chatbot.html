<!-- Chatbot Widget -->
<style>
  #chatbot-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #333;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #chatbot-toggle:hover { background: #555; }

  #chatbot-window {
    position: fixed;
    bottom: 90px;
    right: 28px;
    width: 340px;
    height: 460px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    z-index: 9998;
    overflow: hidden;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.2s;
  }
  #chatbot-window.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(16px);
  }

  #chatbot-header {
    background: #333;
    color: #fff;
    padding: 14px 16px;
    font-weight: bold;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #chatbot-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }

  #chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f7f7f7;
  }
  .chat-msg {
    max-width: 80%;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .chat-msg.bot {
    background: #e8e8e8;
    color: #222;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
  }
  .chat-msg.user {
    background: #333;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }

  #chatbot-input-area {
    display: flex;
    border-top: 1px solid #e0e0e0;
    background: #fff;
    padding: 10px;
    gap: 8px;
  }
  #chatbot-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    outline: none;
    resize: none;
  }
  #chatbot-input:focus { border-color: #999; }
  #chatbot-send {
    background: #333;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: background 0.2s;
  }
  #chatbot-send:hover { background: #555; }
  #chatbot-send:disabled { background: #bbb; cursor: default; }
</style>

<button id="chatbot-toggle" title="Chat">💬</button>

<div id="chatbot-window" class="hidden">
  <div id="chatbot-header">
    <span>Anna's Chatbot</span>
    <button id="chatbot-close" title="닫기">×</button>
  </div>
  <div id="chatbot-messages">
    <div class="chat-msg bot">안녕하세요! 무엇이든 물어보세요 😊</div>
  </div>
  <div id="chatbot-input-area">
    <input type="text" id="chatbot-input" placeholder="메시지를 입력하세요..." maxlength="500" />
    <button id="chatbot-send">전송</button>
  </div>
</div>

<script>
(function() {
  const toggle = document.getElementById('chatbot-toggle');
  const window_ = document.getElementById('chatbot-window');
  const closeBtn = document.getElementById('chatbot-close');
  const messages = document.getElementById('chatbot-messages');
  const input = document.getElementById('chatbot-input');
  const sendBtn = document.getElementById('chatbot-send');

  function openChat() {
    window_.classList.remove('hidden');
    toggle.textContent = '✕';
    input.focus();
  }
  function closeChat() {
    window_.classList.add('hidden');
    toggle.textContent = '💬';
  }

  toggle.addEventListener('click', function() {
    if (window_.classList.contains('hidden')) openChat();
    else closeChat();
  });
  closeBtn.addEventListener('click', closeChat);

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function botReply(userText) {
    // 간단한 규칙 기반 응답 (API 연동 전 기본 버전)
    const lower = userText.toLowerCase();
    let reply = '죄송해요, 아직 그 질문에는 답하기 어렵네요. 😅';
    if (lower.includes('안녕') || lower.includes('hello') || lower.includes('hi')) {
      reply = '안녕하세요! 반갑습니다 👋';
    } else if (lower.includes('이름') || lower.includes('누구')) {
      reply = '저는 Anna\'s Blog의 챗봇이에요!';
    } else if (lower.includes('블로그') || lower.includes('blog')) {
      reply = 'Anna\'s Blog에 오신 것을 환영해요! Technical Writing 관련 글을 다루고 있어요.';
    } else if (lower.includes('감사') || lower.includes('thanks') || lower.includes('thank you')) {
      reply = '천만에요! 😊 또 궁금한 게 있으면 언제든 물어보세요.';
    } else if (lower.includes('잘있') || lower.includes('bye') || lower.includes('안녕히')) {
      reply = '안녕히 계세요! 또 방문해 주세요 👋';
    }
    setTimeout(function() {
      addMessage(reply, 'bot');
      sendBtn.disabled = false;
    }, 600);
  }

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;
    botReply(text);
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
})();
</script>
